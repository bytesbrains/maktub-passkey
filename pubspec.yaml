name: maktub_passkey
description: >-
  Passkey (WebAuthn / P-256) credential create + assert, plus the WebAuthn PRF
  (hmac-secret) extension — the native shim that lets a Maktub smartWallet
  reproduce its ECIES reading key from the passkey (#301).
version: 0.0.1
# In-repo path dependency for now (consumed by mobile/). May publish to pub.dev
# once the native PRF impl lands + clears real-device QA — see README.
publish_to: "none"
repository: https://github.com/nandal/maktub/tree/main/maktub_passkey

environment:
  sdk: ^3.11.4
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Single-package plugin (Dart facade over a MethodChannel + native impls).
flutter:
  plugin:
    platforms:
      android:
        package: it.maktub.passkey
        pluginClass: MaktubPasskeyPlugin
      ios:
        pluginClass: MaktubPasskeyPlugin
