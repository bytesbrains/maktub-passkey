name: maktub_passkey
description: >-
  WebAuthn passkey create/assert plus the PRF (hmac-secret) extension for
  Flutter — derive a stable per-credential secret from a synced passkey on
  iOS and Android. The PRF API the common passkey plugins don't expose.
# Pre-release: PRF cross-device stability is not yet verified on real hardware
# (see README). Published for discovery/early integration; `^` constraints will
# NOT auto-adopt a pre-release, so adoption is deliberate until a stable 0.1.0.
version: 0.1.0-dev.3
repository: https://github.com/bytesbrains/maktub-passkey
issue_tracker: https://github.com/bytesbrains/maktub-passkey/issues
homepage: https://maktub.it
topics:
  - passkey
  - webauthn
  - prf
  - authentication

environment:
  sdk: ^3.11.4
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"

# Single-package plugin (Dart facade over a MethodChannel + native impls).
flutter:
  plugin:
    platforms:
      android:
        package: it.maktub.passkey
        pluginClass: MaktubPasskeyPlugin
      ios:
        pluginClass: MaktubPasskeyPlugin
