version: 2
updates:
  # Keep the GitHub Actions used by CI current (and clear deprecation warnings).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  # Keep Dart/Flutter dependencies current. Pre-release package, so grouping
  # keeps the PR volume low; security updates still arrive individually.
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      dart-dependencies:
        patterns:
          - "*"
